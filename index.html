          const currentYear = new Date().getFullYear();

            { selector: 'meta[property="og:title"]', attr: 'content' },

          ];

          elementsToUpdate.forEach(item => {
            const el = document.querySelector(item.selector);
            if (el) {
              if (item.attr) {
                const oldVal = el.getAttribute(item.attr);
                el.setAttribute(item.attr, oldVal.replace(/202[0-9]/g, currentYear));
              } else {
                el.innerText = el.innerText.replace(/202[0-9]/g, currentYear);
              }
            }
          });

        });
